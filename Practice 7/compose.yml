services:
  postgres:
    container_name: postgres_practice_7
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web-app:
    container_name: web-app_practice_7
    build:
      context: .
      dockerfile: cmd/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: mydb
      DB_SSLMODE: disable
      JWT_SECRET: your-secret-key-here
      ALLOW_ADMIN_REGISTRATION: "true"
    depends_on:
      postgres:
        condition: service_healthy